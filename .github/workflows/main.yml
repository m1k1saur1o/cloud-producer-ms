name: Build and Push Docker Image
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs: 
  build:
    runs-on: ubuntu-latest 
    steps:
    # Paso 1: Checkout del repositorio
    - name: Checkout repository
      uses: actions/checkout@v3

    # Paso 2: Autenticar en DockerHub
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Paso 3: Construir la imagen de Docker
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/producer-ms:latest .

    # Paso 4: Hacer push de la imagen a DockerHub
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/producer-ms:latest

    # Paso 5: Configurar credenciales de AWS para SSH, incluyendo AWS_SESSION_TOKEN
    - name: Set up AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

    # Paso 5.5: Add SSH Key
    - name: Add SSH Key
      run: |
        mkdir -p ~/.ssh
        printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    # Paso 6: Conectarse a EC2 y desplegar el contenedor
    - name: SSH commands to deploy
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
          # Autenticar en DockerHub desde EC2
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          # Descargar la ultima version de la imagen
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/producer-ms:latest
          # Parar y eliminar cualquier contenedor previo
          docker stop producer-ms || true && docker rm producer-ms || true
          # Iniciar el contenedor
          docker run -d --name producer-ms -p 8080:8080 \
            -e RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }} \
            -e RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }} \
            -e RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }} \
            -e RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
            -e AWS_REGION=${{ secrets.AWS_REGION }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/producer-ms:latest
        EOF
        
